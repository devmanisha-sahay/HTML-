<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<link rel="stylesheet" href="style.css">
<body>

    <!-- Navigation -->
    <header>
        <nav>
            <h1 class="logo">MyBrand</h1>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <h2>Welcome to My Landing Page</h2>
        <p>This is a simple, beginner-friendly landing page built with HTML, CSS, and JavaScript.</p>
        <button onclick="showMessage()">Get Started</button>
    </section>

    <!-- Features Section -->
    <section id="features" class="features">
        <h2>Features</h2>
        <div class="feature-box">
            <h3>Fast</h3>
            <p>Quick and responsive design.</p>
        </div>
        <div class="feature-box">
            <h3>Simple</h3>
            <p>Easy to understand and modify.</p>
        </div>
        <div class="feature-box">
            <h3>Modern</h3>
            <p>Clean layout with CSS styling.</p>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact">
        <h2>Contact Us</h2>
        <form onsubmit="return validateForm()">
            <input type="text" id="name" placeholder="Your Name">
            <input type="email" id="email" placeholder="Your Email">
            <button type="submit">Send</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
